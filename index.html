<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spike | Execution for Builders</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        html {
            background-color: #000000;
            scroll-behavior: smooth;
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            color: #ffffff;
            background-color: #000000;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        /* Universal Background - True Black Base */
        .global-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000000 !important;
            background-attachment: fixed;
            z-index: -20;
            pointer-events: none;
        }

        /* Film Grain Texture */
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        #root {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
        }
        
        /* Parallax Starry Mesh Texture */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1; 
            pointer-events: none;
            z-index: -5;
            mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black 40%, transparent 100%);
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        /* Borealis Gradient Animation */
        @keyframes borealis-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-borealis {
            background: linear-gradient(270deg, rgba(255, 215, 0, 0.1), rgba(168, 85, 247, 0.2), rgba(34, 211, 238, 0.2));
            background-size: 200% 200%;
            animation: borealis-shift 8s ease infinite;
        }

        /* Glass Glance for Button */
        @keyframes glass-glance {
            0% { transform: translateX(-100%) skewX(-20deg); }
            20% { transform: translateX(200%) skewX(-20deg); }
            100% { transform: translateX(200%) skewX(-20deg); }
        }
        .animate-glass-glance {
            position: absolute;
            top: 0; left: 0; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg);
            animation: glass-glance 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Clean Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        /* Minimal Input Style */
        .glass-input {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus-within {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.15);
        }

        /* Hall of Fame Animations */
        @keyframes float-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-float-subtle {
            animation: float-subtle 3s ease-in-out infinite;
        }

        @keyframes lift-fade-in {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-lift-fade {
            animation: lift-fade-in 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes cross-fade-in {
            0% { opacity: 0; filter: blur(5px); }
            100% { opacity: 1; filter: blur(0); }
        }
        .animate-cross-fade {
            animation: cross-fade-in 0.8s ease-in-out forwards;
        }

        /* Holographic Glitch & Scan */
        @keyframes glitch-fade {
            0% { opacity: 0; transform: scale(0.9) skewX(10deg); filter: hue-rotate(90deg) blur(5px); }
            20% { opacity: 1; transform: scale(1.05) skewX(-10deg); filter: hue-rotate(-90deg) blur(0); }
            40% { transform: scale(0.98) skewX(5deg); }
            60% { transform: scale(1.02) skewX(-5deg); }
            100% { opacity: 1; transform: scale(1) skewX(0); filter: none; }
        }
        .animate-glitch-fade {
            animation: glitch-fade 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes scan-beam {
            0%, 100% { top: 0%; opacity: 0; }
            50% { top: 100%; opacity: 1; }
            100% { top: 0%; opacity: 0; }
        }
        .animate-scan-beam {
            position: absolute;
            left: 0; right: 0; height: 4px;
            background: linear-gradient(to bottom, transparent, rgba(34,211,238,0.8), transparent);
            animation: scan-beam 2s linear infinite;
            filter: drop-shadow(0 0 5px cyan);
        }

        @keyframes glow-pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
            50% { text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 30px rgba(34,211,238,0.6); }
        }
        .animate-glow-pulse {
            animation: glow-pulse 3s ease-in-out infinite;
        }

        /* 3D Rotation */
        @keyframes rotate-y-360 {
            from { background-position: 0% 0%; }
            to { background-position: 200% 0%; }
        }
        .animate-rotate-y {
            animation: rotate-y-360 15s linear infinite;
        }

        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Updated Placeholder Styles with Purple Glow */
        .premium-input::placeholder {
            color: rgba(230, 230, 255, 0.6) !important; 
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.4); /* Subtle Purple Glow */
            font-size: 18px !important;
            letter-spacing: 0.02em !important;
            text-align: center !important;
            font-weight: 500 !important;
            opacity: 1 !important;
        }

        @media (min-width: 1024px) {
            .premium-input::placeholder {
                font-size: 24px !important; /* Increased to fill more space */
                line-height: 1.4 !important;
            }
        }

        /* Liquid Border for Wall of Fame */
        @keyframes rotate-border { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } } 
        .liquid-border { position: relative; overflow: hidden; border-radius: 24px; } 
        .liquid-border::before { content: ''; position: absolute; top: 50%; left: 50%; width: 250%; height: 250%; background: conic-gradient(from 0deg, #FFD700, #FDB931, #8A6E2F, #FFD700); transform: translate(-50%, -50%); animation: rotate-border 6s linear infinite; z-index: 0; } 
        .liquid-border-content { position: relative; z-index: 1; margin: 2px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 22px; height: calc(100% - 4px); width: calc(100% - 4px); }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="global-bg"></div>
    <div class="bg-mesh"></div>
    <div class="film-grain"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
